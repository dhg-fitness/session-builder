y:flex;align-items:center;justify-content:space-between;gap:10px;background:#f7f8f5;border:1px solid var(--border);border-radius:14px;padding:10px;margin-top:12px}.time{font-size:1.8rem;font-weight:900;font-variant-numeric:tabular-nums}.small{font-size:.86rem}.list-item{border-bottom:1px solid var(--border);padding:10px 0}.hidden{display:none!important}.progress{height:10px;background:#e9eee8;border-radius:999px;overflow:hidden;margin:10px 0 0}.progress>div{height:100%;background:var(--accent);width:0%}@media(max-width:520px){.info-grid{grid-template-columns:1fr}.nav-buttons{grid-template-columns:1fr}}

body.timer-alert::before{
  content:"";
  position:fixed;
  inset:0;
  border:12px solid #f28c28;
  box-shadow:inset 0 0 34px #f28c28,0 0 28px #f28c28;
  pointer-events:none;
  z-index:99999;
  animation:timerFlash .35s alternate 8;
  border-radius:8px;
}
@keyframes timerFlash{
  from{opacity:0}
  to{opacity:1}
}


/* DHG v3 stronger timer alert */
body.timer-alert{
  animation: dhgBodyFlash .22s alternate 12;
}
body.timer-alert::after{
  content:"TIME!";
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(3rem,18vw,8rem);
  font-weight:900;
  color:white;
  background:rgba(242,140,40,.88);
  border:18px solid #1f7a4d;
  box-shadow:inset 0 0 40px #ffffff,0 0 36px #f28c28;
  pointer-events:none;
  z-index:999999;
  animation: dhgAlertPulse .22s alternate 12;
}
@keyframes dhgBodyFlash{
  from{background:#f6f7f2}
  to{background:#ff9f1c}
}
@keyframes dhgAlertPulse{
  from{opacity:.25; transform:scale(.98)}
  to{opacity:1; transform:scale(1)}
}


/* DHG v4 timer layout */
.timer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.timer-box{
  background:#f7f8f5;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}
.timer-box .label{
  font-size:.75rem;
  color:var(--muted);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.round-note{
  background:#fff8ed;
  border:1px solid #ffe0b8;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
}
.round-buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:10px;
}
@media(max-width:520px){
  .timer-grid{grid-template-columns:1fr;}
  .round-buttons{grid-template-columns:1fr;}
}


/* DHG v7 equipment checklist */
.equipment-list{display:grid;gap:8px;margin:12px 0}
.equipment-item{display:flex;gap:10px;align-items:flex-start;background:#f7f8f5;border:1px solid var(--border);border-radius:12px;padding:10px}

.equipment-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}

.round-complete{background:#eef4ee;border:1px solid var(--border);border-radius:14px;padding:10px;margin-top:10px;color:#245c44;font-weight:700}

<section id="addPanel" class="card hidden"><div class="row" style="justify-content:space-between;align-items:center"><h2>Add New Activity</h2><button class="ghost" onclick="hidePanels()">Back</button></div><div class="row"><div class="field"><label>Title</label><input id="newTitle" placeholder="e.g. Story Ball"></div><div class="field"><label>Section</label><select id="newSection"><option>Warm-Up Game</option><option>Light Reaction</option><option>Moderate Movement</option><option>Brain & Movement</option><option>Teamwork & Laughter</option><option>Strength & Resistance</option><option>Power & Conditioning</option><option>Lower Intensity / Reset</option><option>Maintenance Minute</option><option>Team Movement</option></select></div></div><div class="row"><div class="field"><label>Duration minutes</label><input id="newDuration" type="number" value="5"></div><div class="field"><label>Minimum people</label><input id="newMin" type="number" value="3"></div><div class="field"><label>Requires even numbers?</label><select id="newEven"><option value="false">No</option><option value="true">Yes</option></select></div></div><div class="row"><div class="field"><label>Location</label><select id="newLoc"><option value="both">Both</option><option value="outdoor">Outdoor only</option><option value="indoor">Indoor only</option></select></div><div class="field"><label>Intensity</label><select id="newIntensity"><option>low</option><option>low/moderate</option><option>moderate</option><option>moderate/high</option><option>high</option></select></div><div class="field"><label>Fun score</label><select id="newFun"><option>medium</option><option>high</option><option>low</option></select></div></div><label>Equipment</label><input id="newEquipment" placeholder="Cones, ball, bands..."><label>Rounds / Timing</label><input id="newRounds" placeholder="3 rounds x 45 seconds"><label>Setup</label><textarea id="newSetup" rows="2"></textarea><label>How to run</label><textarea id="newHow" rows="3"></te function normaliseLocation(loc){return loc==='both'?['indoor','outdoor']:[loc]}function fits(a,n,loc){return a.locations.includes(loc)&&n>=a.min&&n<=a.max&&!(a.requires_even&&n%2!==0)}function isHigh(a){return (a.intensity||'').includes('high')}
function scoreActivity(a,loc,energy){let s=0;if(a.fun==='high')s+=4;if(a.setup_time==='low')s+=2;if(a.setup_time==='high')s-=2;if(a.locations.length===2)s+=1;if(energy==='lighter'&&isHigh(a))s-=6;if(energy==='higher'&&isHigh(a))s+=2;if(loc==='indoor'&&['marker-flip','build-shape','story-ball'].includes(a.id))s+=2;if(loc==='outdoor'&&['tail-tag','steal','bungee-runs'].includes(a.id))s+=2;return s}
function choose(section,n,loc,used,energy,fallback=[]){let sections=[section,...fallback];let pool=activities.filter(a=>sections.includes(a.section)&&fits(a,n,loc)&&!used.has(a.id));if(energy==='lighter')pool=pool.filter(a=>!isHigh(a));if(!pool.length)pool=activities.filter(a=>sections.includes(a.section)&&fits(a,n,loc)&&!used.has(a.id));if(!pool.length)return null;pool.sort((a,b)=>scoreActivity(b,loc,energy)-scoreActivity(a,loc,energy));let max=Math.min(pool.length,4);let pick=pool[Math.floor(Math.random()*max)];used.add(pick.id);return pick}
function maintenanceCard(n,loc){let pool=activities.filter(a=>a.section==='Maintenance Minute'&&fits(a,n,loc));return pool[Math.floor(Math.random()*pool.length)]||null}
function buildSession(){const n=parseInt(document.getElementById('attendees').value,10),loc=document.getElementById('location').value,energy=document.getElementById('energy').value,used=new Set();let must=['breathing-reset','mobility-flow','light-bounce-footwork','story-ball'];let cards=must.map(id=>activities.find(a=>a.id===id)).filter(Boolean);must.forEach(id=>used.add(id));let plan=[['Light Reaction',[]],['Moderate Movement',['Brain & Movement']],['Teamwork & Laughter',['Brain & Movement']],['Lower Intensity / Reset',['Brain & Movement']],['Strength & Resistance',['Team Movement','Teamwork & Laughter']],['Teamwork & Laughter',['Brain & Movement']],['Power & Conditioning',['Moderate Movement','Team Movement']],['Cool Down',[]]];plan.forEach((p,i)=>{let pick=choose(p[0],n,loc,used,energy,p[1]);if(pick)cards.push(pick);if(i>0&&i<plan.length-1&&pick&&pick.setup_time!=='low'){let mm=maintenanceCard(n,loc);if(mm)cards.push({...mm,id:mm.id+'-'+i})}});let b1=choose('Teamwork & Laughter',n,loc,used,energy,['Light Reaction','Brain & Movement']);let b2=choose('Light Reaction',n,loc,used,energy,['Moderate Movement','Lower Intensity / Reset']);if(b1)cards.push({...b1,bonus:true});if(b2)cards.push({...b2,bonus:true});session=cards;currentIndex=0;document.getElementById('builder').classList.add('hidden');document.getElementById('libraryPanel').classList.add('hidden');document.getElementById('addPanel').classList.add('hidden');document.getElementById('sessionPanel').classList.remove('hidden');document.getElementById('sessionMeta').innerText=`${n} attending • ${loc} • 60 minutes • ${energy}`;showEquipmentChecklist()}

/* DHG v3 alert system */
let dhgAudioCtx = null;
function dhgUnlockAudio(){
  try{
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(!Ctx) return false;
    if(!dhgAudioCtx) dhgAudioCtx = new Ctx();
    if(dhgAudioCtx.state === "suspended") dhgAudioCtx.resume();
    return true;
  }catch(e){ return false; }
}
function dhgBeep(freq, start, duration, volume){
  if(!dhgAudioCtx) return;
  const t = dhgAudioCtx.currentTime + start;
  const osc = dhgAudioCtx.createOscillator();
  const gain = dhgAudioCtx.createGain();
  osc.type = "square";
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(0.0001, t);
  gain.gain.exponentialRampToValueAtTime(volume || 0.45, t + 0.015);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  osc.connect(gain);
  gain.connect(dhgAudioCtx.destination);
  osc.start(t);
  osc.stop(t + duration + 0.03);
}
function dhgPlayBuzzer(){
  dhgUnlockAudio();
  if(!dhgAudioCtx) return;
  dhgBeep(880, 0.00, 0.22, 0.55);
  dhgBeep(660, 0.28, 0.22, 0.55);
  dhgBeep(880, 0.56, 0.22, 0.55);
  dhgBeep(660, 0.84, 0.22, 0.55);
  dhgBeep(440, 1.12, 0.55, 0.65);
}
function dhgFlashScreen(){
  document.body.classList.remove("timer-alert");
  void document.body.offsetWidth;
  document.body.classList.add("timer-alert");
  setTimeout(()=>document.body.classList.remove("timer-alert"), 3200);
}
function timerDoneAlert(){
  dhgPlayBuzzer();
  dhgFlashScreen();
  if(navigator.vibrate) navigator.vibrate([500,150,500,150,800]);
}
function dhgTestAlert(){
  dhgUnlockAudio();
  timerDoneAlert();
}


let totalRemaining=0,roundRemaining=0,roundTotal=0,roundCount=0,currentRound=1,roundMode=false,roundLabels=[];
let checklistReturnIndex=0,equipmentChecked={};

function parseRoundInfo(a){
  if (Array.isArray(a.round_details) && a.round_details.length > 1) {
    return {
      count: a.round_details.length,
      seconds: Math.max(20, Math.round(((a.duration || 1) * 60) / a.round_details.length)),
      labels: a.round_details
    };
  }

  const text = (a.rounds || "").replace(/–/g, "-").trim();
  let info = {count:0, seconds:0, labels:[]};

  let m = text.match(/(\d+)(?:\s*-\s*(\d+))?\s*rounds?.*?(\d+)(?:\s*-\s*(\d+))?\s*(?:sec|seconds?)/i);
  if (m) {
    info.count = parseInt(m[1], 10);
    info.seconds = parseInt(m[3], 10);
  }

  const rMatches = [...text.matchAll(/R(\d+)\s*:?\s*([\s\S]*?)(?=\s*R\d+\s*:|$)/gi)];
  if (rMatches.length >= 2) {
    info.count = rMatches.length;
    info.labels = rMatches.map(x =>
      ("Round " + x[1] + ": " + x[2]).trim().replace(/\s+/g, " ")
    );
    info.seconds = Math.max(30, Math.round(((a.duration || 1) * 60) / info.count));
  }

  if (!info.seconds || info.count < 2) return {count:0, seconds:0, labels:[]};

  if (!info.labels.length) {
    info.labels = Array.from(
      {length: info.count},
      (_, i) => `Round ${i + 1} of ${info.count}: Follow the activity instructions for this round.`
    );
  }

  return info;
}
function initTimers(a){
  clearInterval(timerInterval);
  totalRemaining=(a.duration||1)*60;
  const r=parseRoundInfo(a);
  roundMode=r.count>1;
  roundCount=r.count||0;
  roundTotal=r.seconds||0;
  roundRemaining=roundTotal;
  currentRound=1;
  roundLabels=r.labels||[];
}


function cleanEquipmentName(e){
  return String(e||"").trim().replace(/\s+/g," ");
}
function isNoEquipment(e){
  const s=cleanEquipmentName(e).toLowerCase();
  return !s || s==="none" || s==="n/a" || s==="none.";
}
function buildEquipmentList(){
  const map = new Map();
  session.forEach(a => {
    if(isNoEquipment(a.equipment)) return;
    const key = cleanEquipmentName(a.equipment);
    if(!map.has(key)) map.set(key,{name:key,activities:[],bonus:false});
    const item = map.get(key);
    item.activities.push(a.title + (a.bonus ? " (bonus)" : ""));
    if(a.bonus) item.bonus = true;
  });
  return Array.from(map.values()).sort((a,b)=>a.name.localeCompare(b.name));
}
function openChecklist(){
  if(!session || !session.length){
    alert("Build a session first, then the checklist will appear.");
    return;
  }
  showEquipmentChecklist(true);
}

function showEquipmentChecklist(fromHeader=false){
  clearInterval(timerInterval);

  if(!session || !session.length){
    alert("Build a session first.");
    return;
  }

  checklistReturnIndex = fromHeader ? currentIndex : 0;
  if(!fromHeader) currentIndex = 0;

  document.getElementById("builder").classList.add("hidden");
  document.getElementById("libraryPanel").classList.add("hidden");
  document.getElementById("addPanel").classList.add("hidden");
  document.getElementById("sessionPanel").classList.remove("hidden");

  const panel = document.getElementById("activityCard");
  const list = buildEquipmentList();

  const listHtml = list.length ? list.map((item,i)=>`
    <label class="equipment-item">
      <input type="checkbox" ${equipmentChecked[item.name] ? "checked" : ""} onchange="equipmentChecked['${item.name.replace(/'/g,"&#39;")}']=this.checked">
      <span>
        <b>${esc(item.name)}</b>
        <small>For: ${esc(item.activities.join(", "))}</small>
      </span>
    </label>
  `).join("") : `<p>No equipment needed for this generated session.</p>`;

  const returnButton = fromHeader
    ? `<button class="primary" onclick="currentIndex=checklistReturnIndex; renderCard()">Back to Current Activity</button>`
    : `<button class="primary" onclick="renderCard()">Start Session</button>`;

  panel.innerHTML = `
    <div class="section-title">Before You Start</div>
    <div class="big-title">Equipment Checklist</div>
    <p class="muted">Pack / prepare these before starting the session. You can also return to this checklist from the header button.</p>
    <div class="equipment-list">${listHtml}</div>
    <div class="equipment-actions">
      <button class="secondary" onclick="resetToBuilder()">Change Session</button>
      ${returnButton}
    </div>
  `;
  updateProgress();
}

function renderCard(){
  clearInterval(timerInterval);
  const a=session[currentIndex],panel=document.getElementById('activityCard');
  if(!a){
    panel.innerHTML='<h2>Session complete</h2><p>Good job. You reached the end.</p><button class="primary" onclick="resetToBuilder()">Build Another Session</button>';
    return;
  }

  initTimers(a);

  let badges=[
    a.bonus?'<span class="badge orange">Bonus / optional</span>':'',
    `<span class="badge">${a.section}</span>`,
    `<span class="badge blue">${a.intensity}</span>`,
    `<span class="badge">${a.duration} mins</span>`
  ].join('');

  const roundPanel = roundMode ? `
    <div class="timer-grid">
      <div class="timer-box">
        <div class="label">Total Activity Time</div>
        <div id="totalTime" class="time">${formatTime(totalRemaining)}</div>
      </div>
      <div class="timer-box">
        <div class="label">Round ${currentRound} of ${roundCount}</div>
        <div id="roundTime" class="time">${formatTime(roundRemaining)}</div>
      </div>
    </div>
    <div id="roundNote" class="round-note">${esc(getRoundLabel())}</div>
    <div id="roundControlArea">${roundControlsHtml()}</div>
  ` : `
    <div class="timer">
      <div>
        <div class="muted small">Activity Timer</div>
        <div id="totalTime" class="time">${formatTime(totalRemaining)}</div>
      </div>
      <div>
        <button class="secondary" onclick="startTimer()">Start</button>
        <button class="secondary" onclick="pauseTimer()">Pause</button>
        <button class="secondary" onclick="resetTimer()">Reset</button>
      </div>
    </div>
  `;

  panel.innerHTML=`
    <div class="section-title">Card ${currentIndex+1} of ${session.length}</div>
    <div class="big-title">${esc(a.title)}</div>
    <div>${badges}</div>
    <div class="info-grid">
      <div class="info"><b>Equipment</b>${esc(a.equipment)}</div>
      <div class="info"><b>Rounds / timing</b>${esc(a.rounds)}</div>
      <div class="info"><b>Setup</b>${esc(a.setup)}</div>
      <div class="info"><b>Coaching note</b>${esc(a.notes)}</div>
    </div>
    <h3>How to run</h3>
    <p>${esc(a.how)}</p>
    ${roundPanel}
    <div class="nav-buttons">
      <button class="secondary" onclick="prevCard()">Back</button>
      <button class="danger" onclick="skipCard()">Skip Activity</button>
      <button class="primary" onclick="nextCard()">Next Activity</button>
    </div>
    <button class="ghost" onclick="replaceCard()">Replace this activity</button>
  `;
  updateProgress();
}

function getRoundLabel(){
  if(!roundMode) return "";
  if(roundLabels[currentRound-1]) return roundLabels[currentRound-1];
  return `Round ${currentRound} of ${roundCount}. Press Start Round when ready.`;
}

function roundControlsHtml(){
  if(!roundMode) return "";

  if(currentRound >= roundCount && roundRemaining <= 0){
    return `<div class="round-complete">All rounds complete. Use Next Activity when ready.</div>`;
  }

  const isLast = currentRound >= roundCount;
  const secondRow = isLast
    ? `<div class="round-buttons"><button class="danger" onclick="skipRound()">Skip Final Round</button></div>`
    : `<div class="round-buttons">
        <button class="danger" onclick="skipRound()">Skip Round</button>
        <button class="primary" onclick="nextRoundManual()">Next Round</button>
      </div>`;

  return `
    <div class="round-buttons">
      <button class="secondary" onclick="startTimer()">Start Round</button>
      <button class="secondary" onclick="pauseTimer()">Pause</button>
      <button class="secondary" onclick="resetRoundTimer()">Reset Round</button>
    </div>
    ${secondRow}
  `;
}

function updateRoundControls(){
  const area=document.getElementById('roundControlArea');
  if(area) area.innerHTML=roundControlsHtml();
}

function updateTimerDisplay(){
  const totalEl=document.getElementById('totalTime');
  if(totalEl) totalEl.innerText=formatTime(totalRemaining);
  const roundEl=document.getElementById('roundTime');
  if(roundEl) roundEl.innerText=formatTime(roundRemaining);
  const noteEl=document.getElementById('roundNote');
  if(noteEl) noteEl.innerText=getRoundLabel();
  const labels=document.querySelectorAll('.timer-box .label');
  if(roundMode && labels.length>1) labels[1].innerText=`Round ${currentRound} of ${roundCount}`;
  updateRoundControls();
}

function updateProgress(){
  document.getElementById('progressBar').style.width=(session.length?(currentIndex/session.length)*100:0)+'%';
}

function nextCard(){currentIndex++;showEquipmentChecklist()}
function prevCard(){if(currentIndex>0)currentIndex--;renderCard()}
function skipCard(){nextCard()}

function replaceCard(){
  let old=session[currentIndex],
      n=parseInt(document.getElementById('attendees').value,10),
      loc=document.getElementById('location').value,
      energy=document.getElementById('energy').value,
      used=new Set(session.map(a=>String(a.id).replace(/-\d+$/,'')));
  used.delete(String(old.id).replace(/-\d+$/,''));
  let repl=choose(old.section,n,loc,used,energy,['Brain & Movement','Teamwork & Laughter','Light Reaction','Moderate Movement','Lower Intensity / Reset']);
  if(repl){session[currentIndex]=repl;renderCard()}else alert('No suitable replacement found for this slot.');
}

function startTimer(){
  dhgUnlockAudio();
  if(typeof unlockAudio==='function') unlockAudio();
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    if(roundMode){
      if(totalRemaining>0) totalRemaining--;
      if(roundRemaining>0) roundRemaining--;

      if(roundRemaining<=0){
        roundRemaining=0;
        clearInterval(timerInterval);
        timerDoneAlert();
        if(currentRound<roundCount){
          currentRound++;
          roundRemaining=roundTotal;
          setTimeout(updateTimerDisplay,250);
        }
      }
    }else{
      if(totalRemaining>0) totalRemaining--;
      if(totalRemaining<=0){
        totalRemaining=0;
        clearInterval(timerInterval);
        timerDoneAlert();
      }
    }
    updateTimerDisplay();
  },1000);
}

function pauseTimer(){clearInterval(timerInterval)}

function resetTimer(){
  clearInterval(timerInterval);
  totalRemaining=(session[currentIndex].duration||1)*60;
  if(roundMode){
    currentRound=1;
    roundRemaining=roundTotal;
  }
  updateTimerDisplay();
}

function resetRoundTimer(){
  clearInterval(timerInterval);
  roundRemaining=roundTotal;
  updateTimerDisplay();
}

function nextRoundManual(){
  clearInterval(timerInterval);
  if(!roundMode) return;
  if(currentRound < roundCount){
    currentRound++;
    roundRemaining = roundTotal;
  }
  updateTimerDisplay();
}

function skipRound(){
  clearInterval(timerInterval);
  if(!roundMode) return;
  if(currentRound < roundCount){
    currentRound++;
    roundRemaining = roundTotal;
  }else{
    roundRemaining = 0;
  }
  updateTimerDisplay();
}


function formatTime(s){
  s=Math.max(0,Math.round(s||0));
  let m=Math.floor(s/60),sec=s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function resetToBuilder(){clearInterval(timerInterval);document.getElementById('sessionPanel').classList.add('hidden');document.getElementById('builder').classList.remove('hidden')}function hidePanels(){document.getElementById('libraryPanel').classList.add('hidden');document.getElementById('addPanel').classList.add('hidden');document.getElementById('builder').classList.remove('hidden')}function showLibrary(){document.getElementById('builder').classList.add('hidden');document.getElementById('addPanel').classList.add('hidden');document.getElementById('libraryPanel').classList.remove('hidden');renderLibrary()}function showAdd(){document.getElementById('builder').classList.add('hidden');document.getElementById('libraryPanel').classList.add('hidden');document.getElementById('addPanel').classList.remove('hidden')}
function renderLibrary(){let q=(document.getElementById('search').value||'').toLowerCase(),list=document.getElementById('libraryList');let rows=activities.filter(a=>!q||(a.title+a.section+a.equipment+a.how).toLowerCase().includes(q));rows.sort((a,b)=>a.section.localeCompare(b.section)||a.title.localeCompare(b.title));list.innerHTML=rows.map(a=>`<div class="list-item"><b>${esc(a.title)}</b><br><span class="badge">${a.section}</span><span class="badge">${a.duration} mins</span><span class="badge">${a.locations.join(', ')}</span><div class="small muted">${esc(a.how)}</div></div>`).join('')}
function addActivity(){let title=document.getElementById('newTitle').value.trim();if(!title)return alert('Please add a title.');let locVal=document.getElementById('newLoc').value;let a={id:title.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Date.now(),title,section:document.getElementById('newSection').value,duration:parseInt(document.getElementById('newDuration').value,10)||5,rounds:document.getElementById('newRounds').value,
    round_details:(document.getElementById('newRoundDetails') ? document.getElementById('newRoundDetails').value : '').split('\n').map(x=>x.trim()).filter(Boolean),intensity:document.getElementById('newIntensity').value,locations:normaliseLocation(locVal),min:parseInt(document.getElementById('newMin').value,10)||1,max:99,requires_even:document.getElementById('newEven').value==='true',equipment:document.getElementById('newEquipment').value,setup_time:'medium',fun:document.getElementById('newFun').value,setup:document.getElementById('newSetup').value,how:document.getElementById('newHow').value,notes:document.getElementById('newNotes').value};activities.push(a);saveActivities();alert('Activity added.');showLibrary()}
function exportData(){let blob=new Blob([JSON.stringify(activities,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='dhg-activity-library.json';a.click();URL.revokeObjectURL(url)}function importData(event){let file=event.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=e=>{try{activities=JSON.parse(e.target.result);saveActivities();renderLibrary();alert('Imported.')}catch(err){alert('Could not import JSON.')}};reader.readAsText(file)}function resetLibrary(){if(confirm('Reset library to the built-in version? This removes activities you added on this device.')){activities=DEFAULT_ACTIVITIES;saveActivities();renderLibrary()}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
