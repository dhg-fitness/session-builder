<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DHG Fitness Session Builder</title>
<style>
:root{--orange:#f47b20;--dark:#17212b;--soft:#f6f7f8;--line:#dde1e6}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#f4f5f6;color:#17212b}
header{background:#17212b;color:white;padding:18px 16px}
header h1{margin:0;font-size:1.25rem}header p{margin:6px 0 0;color:#dbe2ea;font-size:.95rem}
.wrap{max-width:920px;margin:0 auto;padding:16px}
.card{background:white;border:1px solid var(--line);border-radius:16px;padding:18px;margin:14px 0;box-shadow:0 1px 6px #0000000d}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:12px}
label{display:block;font-weight:700;margin-bottom:6px}select,button{font-size:1rem;border-radius:10px;border:1px solid #cfd6de;padding:10px;background:white}
button{cursor:pointer;font-weight:700}button.primary{background:var(--orange);color:white;border-color:var(--orange)}button.secondary{background:#eef1f4}
button.danger{background:#fff1f1;border-color:#ffc9c9;color:#9d1c1c}
.big{font-size:1.55rem;font-weight:800;margin:8px 0}.muted{color:#65717d}.small{font-size:.9rem}
.badge{display:inline-block;background:#eef1f4;border-radius:999px;padding:5px 9px;margin:3px;font-size:.84rem}.orange{background:#fff0e5;color:#a84b00}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:12px}
.info{background:#f7f8fa;border:1px solid #e2e5e9;border-radius:12px;padding:12px}.info b{display:block;margin-bottom:5px}
.round{white-space:pre-line;background:#fff;border-left:5px solid var(--orange);border-radius:10px;padding:12px;margin:10px 0;line-height:1.35}
.nav{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.hidden{display:none}
.timer{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#17212b;color:white;border-radius:14px;padding:12px;margin:12px 0}.time{font-size:2rem;font-weight:900}
.eq label{display:flex;gap:10px;align-items:flex-start;background:#f8f9fa;border:1px solid #e2e5e9;border-radius:12px;padding:10px;margin:8px 0}.eq input{margin-top:3px}
.progress{height:9px;background:#e4e7eb;border-radius:999px;overflow:hidden;margin-top:14px}.bar{height:100%;background:var(--orange);width:0%}
</style>
</head>
<body>
<header><div class="wrap"><h1>DHG Fitness Session Builder</h1><p>Functional fitness first — friendly, varied and enjoyable, not childish or punishing.</p></div></header>
<main class="wrap">
<section id="builder" class="card">
<h2>Build this week’s session</h2>
<div class="grid">
<div><label for="attendees">People attending</label><select id="attendees"><option>2</option><option>3</option><option selected>4</option><option>5</option><option>6</option><option>7</option><option>8</option></select></div>
<div><label for="location">Location</label><select id="location"><option value="outdoor" selected>Outdoor</option><option value="indoor">Indoor</option></select></div>
<div><label for="energy">Energy</label><select id="energy"><option value="normal" selected>Normal</option><option value="lighter">Lighter</option><option value="higher">Higher</option></select></div>
</div>
<p class="muted">This version builds a fixed 60-minute session for this week. Optional bonus cards sit before cool down.</p>
<button class="primary" onclick="buildSession()">Build Session</button>
</section>

<section id="session" class="hidden">
<div class="card">
<div id="meta" class="muted"></div>
<div class="progress"><div id="bar" class="bar"></div></div>
</div>
<div id="card"></div>
</section>
</main>
<script>
const ACTIVITIES = [{"id": "breathing", "title": "Breathing Reset", "section": "Warm Up", "mins": 2, "uses": "None", "pack": [], "rounds": ["2 minutes\nSetup: Loose standing circle.\nDo: Stand tall, relax shoulders. Breathe in for 4, hold for 2, breathe out for 6.\nCoach: Calm start. Keep it simple."]}, {"id": "mobility", "title": "Mobility Flow", "section": "Warm Up", "mins": 5, "uses": "None", "pack": [], "rounds": ["5 minutes\nSetup: Open space.\nDo: Shoulder rolls, arm swings, side reaches, trunk rotations, hip circles, ankle circles, easy knee bends if comfortable.\nCoach: Gentle and adult. Offer knee-friendly options."]}, {"id": "footwork", "title": "Footwork Flow", "section": "Warm Up", "mins": 5, "uses": "None", "pack": [], "rounds": ["5 minutes\nSetup: Open space with room to move.\nDo: Side-to-sides, left foot front/back, right foot front/back, quick steps on spot, bounce on spot, walk around, side-step, light skipping, change direction.\nCoach: Rhythm and coordination, not a hard drill."]}, {"id": "story", "title": "Story Ball Warm-Up", "section": "Warm Up Game", "mins": 7, "uses": "1 small lightweight ball", "pack": ["1 small lightweight rubber ball"], "rounds": ["Round 1 — One Word Story\nSetup: Loose walking circle. Use the small ball.\nDo: Catcher adds ONE word, calls a name and passes.\nCoach: Start with a word such as holiday, dog or sandwich. Keep everyone walking gently.\nEnd: About 2 minutes.", "Round 2 — Luckily / Unfortunately\nSetup: Same walking circle.\nDo: Catcher adds a short phrase starting with Luckily... or Unfortunately... then passes.\nCoach: Alternate the starter each pass. Example: Luckily, the dog found a sandwich / Unfortunately, it was moving.\nEnd: About 2 minutes.", "Round 3 — Theme Twist\nSetup: Same circle.\nDo: Before the pass, David calls one theme: food, animal, holiday, weather, mystery or trouble. Catcher adds a short phrase using that theme.\nCoach: Keep it short. No acting, no sound effects, no forced silliness.\nEnd: About 2 minutes."]}, {"id": "marker", "title": "Marker Reaction Challenge", "section": "Movement Game", "mins": 6, "uses": "Approx. 20 yellow discs + 4 cones to mark the area", "pack": ["50 yellow marker discs", "10 blue cones"], "rounds": ["Round 1 — Up v Down\nSetup: Scatter about 20 yellow discs. Two teams: UP and DOWN.\nDo: UP team turns discs face up. DOWN team turns discs face down.\nCoach: Everyone moves at the same time. No guarding discs. Odd numbers are fine: use 2 v 3 and swap one person next round.\nEnd: Count after 90 seconds.", "Round 2 — Switch on Call\nSetup: Same discs and teams.\nDo: Start the same. When David calls SWITCH, teams swap roles immediately.\nCoach: Call SWITCH 2–3 times. Adds reaction without complicated rules.\nEnd: Count after 90 seconds.", "Round 3 — Team Reset Challenge\nSetup: Same discs. Everyone now works together.\nDo: Group turns all discs up, then all discs down, then all discs up again.\nCoach: Time them or count how many full resets they complete. Everyone works at once.\nEnd: Stop after 90 seconds."]}, {"id": "strength", "title": "Functional Strength Stations", "section": "Strength & Control", "mins": 14, "uses": "Bands + handles, 2 slam balls, wall ball, 5 cones, approx. 10 discs", "pack": ["Resistance tubes + 4 handles", "Slam balls: 4kg + 7kg", "Wall ball 10lb", "10 blue cones", "50 yellow marker discs"], "rounds": ["Block 1 — Teach & Practise\nSetup: Set stations based on numbers: 2 people = first 2 stations; 3 = first 3; 4 = first 4; 5 = all 5; 6–8 = pair/share stations.\nDo: Stations: 1 Band Row, 2 Band Press, 3 Slam Ball Lift/Carry, 4 Wall Ball Front Carry, 5 Cone Step/Reach or Disc Carry.\nCoach: Show each station quickly. Easy effort. The aim is good movement, not exhaustion.\nEnd: About 4 minutes.", "Block 2 — Working Circuit\nSetup: Same stations.\nDo: 40 seconds work, 20 seconds change. Rotate around the stations.\nCoach: Smooth movement, good posture, no rushing. With 5 people, everyone has their own station.\nEnd: One full circuit.", "Block 3 — Second Circuit / Better Quality\nSetup: Same stations.\nDo: Repeat the circuit. Aim for better control than Block 2.\nCoach: If anyone is unsure, simplify the movement rather than pushing harder.\nEnd: One full circuit."]}, {"id": "memory", "title": "Memory Shuttle Challenge", "section": "Brain & Movement", "mins": 7, "uses": "4 cones", "pack": ["10 blue cones"], "rounds": ["Round 1 — Touch the Code\nSetup: Set 4 cones in a line or square. Number them 1–4.\nDo: David calls a short code, e.g. 1-3-2. They touch those cones in order and return.\nCoach: Start with 3 numbers. Add a fourth only if it is going well.\nEnd: About 2 minutes.", "Round 2 — Human Code\nSetup: Same 4 numbered cones.\nDo: People become the code. David calls 1-3-2-4 and the group arranges themselves at those cone numbers in that order.\nCoach: For 2–3 people, use shorter codes. For 5+, one person can be checker then rotate.\nEnd: About 2 minutes.", "Round 3 — Add-On Code\nSetup: Same 4 cones.\nDo: Start with one number: 2. Then add one each time: 2-4, then 2-4-1, then 2-4-1-3. They repeat the growing sequence.\nCoach: If they forget it, restart with a new sequence. No discs needed.\nEnd: About 2 minutes."]}, {"id": "carry", "title": "Loaded Carry Team Challenge", "section": "Functional Conditioning", "mins": 6, "uses": "2 slam balls, wall ball, stack of discs, broom handle, 5 cones", "pack": ["Slam balls: 4kg + 7kg", "Wall ball 10lb", "50 yellow marker discs", "2 broom handles / bars", "10 blue cones"], "rounds": ["Round 1 — Carry Technique\nSetup: Create short lanes. Loads: 4kg slam ball, 7kg slam ball, wall ball, stack of discs, broom handle/front carry.\nDo: Everyone carries their load to the cone and back under control.\nCoach: For 2–4 people, use only the first lanes. For 5 people, everyone has a lane. For 6–8, pair/share lanes and rotate.\nEnd: Stop after 90 seconds.", "Round 2 — Cone Route\nSetup: Same loads. Add 2–3 cones in each lane.\nDo: Carry to cone 1 and back, cone 2 and back, cone 3 and back.\nCoach: Controlled posture. Walk, do not race.\nEnd: Stop after 90 seconds.", "Round 3 — Team Total\nSetup: Same lanes.\nDo: As a group, count total controlled carries completed in 90 seconds.\nCoach: Everybody contributes. No one should be standing around.\nEnd: Stop after 90 seconds."]}, {"id": "cool", "title": "Cool Down & Stretch", "section": "Cool Down", "mins": 8, "uses": "None", "pack": [], "rounds": ["8 minutes\nSetup: Loose circle.\nDo: Slow walking, breathing reset, shoulder/neck release, calves, hamstrings, quads, hips, chest/side stretch.\nCoach: Calm finish. Always last."]}, {"id": "tag", "title": "Optional Bonus: Agility Tag", "section": "Optional Bonus", "mins": 5, "uses": "1 tea towel/bib tail + 4 cones", "pack": ["1 tea towel / bib tail", "10 blue cones"], "bonus": true, "minPeople": 3, "rounds": ["Round 1 — Tag Transfer\nSetup: 4 cones in a small square. One tea towel tag.\nDo: Whoever gets the tag wears it and the game continues.\nCoach: Walking/light jogging only.\nEnd: After 60 seconds.", "Round 2 — Smaller Area\nSetup: Bring the square in.\nDo: Same game in less space.\nCoach: More agility, not more speed.\nEnd: After 60 seconds.", "Round 3 — Final Round\nSetup: Normal area.\nDo: Final tag transfer round.\nCoach: Finish while it is still fun.\nEnd: After 60 seconds."]}, {"id": "pole", "title": "Optional Bonus: Partner Pole Push / Pull", "section": "Optional Bonus", "mins": 6, "uses": "1–2 broom handles/bars", "pack": ["2 broom handles / bars"], "bonus": true, "rounds": ["Round 1 — Push & Resist\nSetup: Pairs hold broom handle between them.\nDo: A pushes while B resists for 20–30 seconds, then swap.\nCoach: Smooth effort, no jerking.\nEnd: After 2 minutes.", "Round 2 — Pull & Resist\nSetup: Same pairs.\nDo: A pulls while B resists for 20–30 seconds, then swap.\nCoach: Shoulders down, controlled movement.\nEnd: After 2 minutes."]}];
let session=[],i=0,timer=null,remaining=0,checked={};

function esc(s){return String(s??"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function fmt(s){s=Math.max(0,Math.round(s));return `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}`}
function mainActs(){return ACTIVITIES.filter(a=>!a.bonus)}
function byId(id){return ACTIVITIES.find(a=>a.id===id)}
function buildSession(){
 const n=+document.getElementById("attendees").value, loc=document.getElementById("location").value;
 const ids=["breathing","mobility","footwork","story","marker","strength","memory","carry","cool"];
 session=ids.map(byId).filter(Boolean);
 const bonus=[]; if(n>=3) bonus.push({...byId("tag"),bonus:true}); bonus.push({...byId("pole"),bonus:true});
 const cool=session.find(a=>a.id==="cool"); session=session.filter(a=>a.id!=="cool").concat(bonus).concat(cool);
 i=0; document.getElementById("builder").classList.add("hidden"); document.getElementById("session").classList.remove("hidden");
 document.getElementById("meta").textContent=`${n} attending • ${loc} • 60-minute main session • optional bonus before cool down`;
 showChecklist();
}
function equipmentList(){
 const pack=["10 blue cones","50 yellow marker discs","1 small lightweight rubber ball"];
 const extras=new Map();
 session.forEach(a=>(a.pack||[]).forEach(x=>{if(pack.includes(x))return;if(!extras.has(x))extras.set(x,[]);extras.get(x).push(a.title)}));
 return {pack,extras};
}
function showChecklist(){
 clearInterval(timer);
 const {pack,extras}=equipmentList();
 const packHtml=pack.map(x=>`<label><input type="checkbox"> <span><b>${esc(x)}</b><br><small>Standard pack list</small></span></label>`).join("");
 const extraHtml=[...extras.entries()].map(([x,acts])=>`<label><input type="checkbox"> <span><b>${esc(x)}</b><br><small>For: ${esc([...new Set(acts)].join(", "))}</small></span></label>`).join("") || "<p>No extra kit beyond the standard pack.</p>";
 document.getElementById("card").innerHTML=`<div class="card"><div class="muted">Before you start</div><div class="big">Equipment Checklist</div><p class="muted">Standard pack list first, then extra kit used by this generated session. Activity cards show the actual amount used.</p><h3>Standard pack</h3><div class="eq">${packHtml}</div><h3>Extra kit for this session</h3><div class="eq">${extraHtml}</div><div class="nav"><button class="secondary" onclick="resetApp()">Change Session</button><button class="primary" onclick="showCard()">Start Session</button></div></div>`;
 updateBar();
}
function showCard(){
 clearInterval(timer);
 const a=session[i]; if(!a){document.getElementById("card").innerHTML=`<div class="card"><div class="big">Session complete</div><button class="primary" onclick="resetApp()">Build another</button></div>`;return}
 remaining=(a.mins||1)*60;
 const rounds=(a.rounds||[]).map(x=>`<div class="round">${esc(x)}</div>`).join("");
 document.getElementById("card").innerHTML=`<div class="card">
 <div class="muted">${a.bonus?"Optional Bonus • ":""}Activity ${i+1} of ${session.length}</div>
 <div class="big">${esc(a.title)}</div>
 <span class="badge">${esc(a.section)}</span><span class="badge">${a.mins} mins</span><span class="badge">${esc(a.intensity||"")}</span>
 <div class="info-grid">
  <div class="info"><b>This activity uses</b>${esc(a.uses)}</div>
  <div class="info"><b>Why it is here</b>${esc(a.section==="Strength & Control"?"Main strength/control content":a.section==="Functional Conditioning"?"Functional carry/conditioning":a.section)}</div>
 </div>
 <div class="timer"><div><div class="small">Activity timer</div><div id="time" class="time">${fmt(remaining)}</div></div><div><button onclick="start()">Start</button> <button onclick="pause()">Pause</button> <button onclick="resetTimer()">Reset</button></div></div>
 <h3>How to run</h3>${rounds}
 <div class="nav">${i>0?'<button class="secondary" onclick="prev()">Back</button>':''}<button class="danger" onclick="skip()">Skip</button><button class="primary" onclick="next()">Next</button><button class="secondary" onclick="showChecklist()">Checklist</button></div>
 </div>`;
 updateBar();
}
function start(){clearInterval(timer);timer=setInterval(()=>{remaining--;document.getElementById("time").textContent=fmt(remaining);if(remaining<=0){clearInterval(timer);}},1000)}
function pause(){clearInterval(timer)}
function resetTimer(){const a=session[i];remaining=(a.mins||1)*60;document.getElementById("time").textContent=fmt(remaining)}
function next(){i++;showCard()} function prev(){i=Math.max(0,i-1);showCard()} function skip(){next()}
function updateBar(){document.getElementById("bar").style.width=session.length?`${Math.round((i/session.length)*100)}%`:"0%"}
function resetApp(){clearInterval(timer);document.getElementById("session").classList.add("hidden");document.getElementById("builder").classList.remove("hidden")}
</script>
</body></html>
