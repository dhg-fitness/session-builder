y:flex;align-items:center;justify-content:space-between;gap:10px;background:#f7f8f5;border:1px solid var(--border);border-radius:14px;padding:10px;margin-top:12px}.time{font-size:1.8rem;font-weight:900;font-variant-numeric:tabular-nums}.small{font-size:.86rem}.list-item{border-bottom:1px solid var(--border);padding:10px 0}.hidden{display:none!important}.progress{height:10px;background:#e9eee8;border-radius:999px;overflow:hidden;margin:10px 0 0}.progress>div{height:100%;background:var(--accent);width:0%}@media(max-width:520px){.info-grid{grid-template-columns:1fr}.nav-buttons{grid-template-columns:1fr}}

body.timer-alert::before{
  content:"";
  position:fixed;
  inset:0;
  border:12px solid #f28c28;
  box-shadow:inset 0 0 34px #f28c28,0 0 28px #f28c28;
  pointer-events:none;
  z-index:99999;
  animation:timerFlash .35s alternate 8;
  border-radius:8px;
}
@keyframes timerFlash{
  from{opacity:0}
  to{opacity:1}
}


/* DHG v3 stronger timer alert */
body.timer-alert{
  animation: dhgBodyFlash .22s alternate 12;
}
body.timer-alert::after{
  content:"TIME!";
  position:fixed;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(3rem,18vw,8rem);
  font-weight:900;
  color:white;
  background:rgba(242,140,40,.88);
  border:18px solid #1f7a4d;
  box-shadow:inset 0 0 40px #ffffff,0 0 36px #f28c28;
  pointer-events:none;
  z-index:999999;
  animation: dhgAlertPulse .22s alternate 12;
}
@keyframes dhgBodyFlash{
  from{background:#f6f7f2}
  to{background:#ff9f1c}
}
@keyframes dhgAlertPulse{
  from{opacity:.25; transform:scale(.98)}
  to{opacity:1; transform:scale(1)}
}


/* DHG v4 timer layout */
.timer-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
  margin-top:12px;
}
.timer-box{
  background:#f7f8f5;
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px;
}
.timer-box .label{
  font-size:.75rem;
  color:var(--muted);
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:.04em;
}
.round-note{
  background:#fff8ed;
  border:1px solid #ffe0b8;
  border-radius:14px;
  padding:10px;
  margin-top:10px;
}
.round-buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:8px;
  margin-top:10px;
}
@media(max-width:520px){
  .timer-grid{grid-template-columns:1fr;}
  .round-buttons{grid-template-columns:1fr;}
}

function dhgBeep(freq, start, duration, volume){
  if(!dhgAudioCtx) return;

function explicitRoundSeconds(text){
  text = String(text || "").replace(/–/g,"-").trim();
  let m = text.match(/(\d+)(?:\s*-\s*(\d+))?\s*rounds?.*?(\d+)(?:\s*-\s*(\d+))?\s*(?:sec|seconds?)/i);
  if(!m) return null;
  return {
    count: parseInt(m[1],10),
    seconds: parseInt(m[4] || m[3],10)
  };
}

function parseRoundInfo(a){
  const explicit = explicitRoundSeconds(a.rounds);
  const hasDetails = Array.isArray(a.round_details) && a.round_details.length > 1;

  if (hasDetails) {
    const count = a.round_details.length;
    const seconds = explicit && explicit.seconds
      ? explicit.seconds
      : Math.max(20, Math.round(((a.duration || 1) * 60) / count));
    return {
      count,
      seconds,
      labels: a.round_details
    };
  }

  const text = (a.rounds || "").replace(/–/g, "-").trim();
  let info = {count:0, seconds:0, labels:[]};

  if (explicit) {
    info.count = explicit.count;
    info.seconds = explicit.seconds;
  }

  const rMatches = [...text.matchAll(/R(\d+)\s*:?\s*([\s\S]*?)(?=\s*R\d+\s*:|$)/gi)];
  if (rMatches.length >= 2) {
    info.count = rMatches.length;
    info.labels = rMatches.map(x =>
      ("Round " + x[1] + ": " + x[2]).trim().replace(/\s+/g, " ")
    );
    if(!info.seconds){
      info.seconds = Math.max(30,Math.round(((a.duration || 1) * 60) / info.count));
    }
  }

  if (!info.seconds || info.count < 2) return {count:0, seconds:0, labels:[]};

  if (!info.labels.length) {
    info.labels = Array.from(
      {length: info.count},
      (_, i) => `Round ${i + 1} of ${info.count}: Follow the activity instructions for this round.`
    );
  }

  return info;
}

  `;

  panel.innerHTML=`
    <div class="section-title">${currentStepLabel(a)}</div>
    <div class="big-title">${esc(displayTitle(a))}</div>
    <div>${badges}</div>
    <div class="info-grid">
      <div class="info"><b>Equipment</b>${esc(a.equipment)}</div>
      <div class="info"><b>Rounds / timing</b>${esc(timingText(a))}</div>
      <div class="info"><b>Setup</b>${esc(a.setup)}</div>
      <div class="info"><b>Coaching note</b>${esc(a.notes)}</div>
    </div>
    <h3>How to run</h3>
    <p>${esc(a.how)}</p>
    ${roundPanel}
    <div class="nav-buttons">
      ${currentIndex > 0 ? '<button class="secondary" onclick="prevCard()">Back</button>' : ''}
      <button class="danger" onclick="skipCard()">Skip</button>
      <button class="primary" onclick="nextCard()">Next</button>
    </div>
    <button class="ghost" onclick="replaceCard()">Replace this activity</button>
  `;
  updateProgress();
}

function getRoundLabel(){
  if(!roundMode) return "";
  if(roundLabels[currentRound-1]) return roundLabels[currentRound-1];
  return `Round ${currentRound} of ${roundCount}. Press Start when ready.`;
}

function roundControlsHtml(){
  if(!roundMode) return "";

  if(currentRound >= roundCount && roundRemaining <= 0){
    return `<div class="round-complete">All rounds complete. Use Next when ready.</div>`;
  }

  const isLast = currentRound >= roundCount;
  const secondRow = isLast
    ? `<div class="round-buttons"><button class="danger" onclick="skipRound()">Skip Final Round</button></div>`
    : `<div class="round-buttons">
        <button class="danger" onclick="skipRound()">Skip Round</button>
        <button class="primary" onclick="nextRoundManual()">Next Round</button>
      </div>`;

  return `
    <div class="round-buttons">
      <button class="secondary" onclick="startTimer()">Start</button>
      <button class="secondary" onclick="pauseTimer()">Pause</button>
      <button class="secondary" onclick="resetRoundTimer()">Reset</button>
    </div>
    ${secondRow}
  `;
}

function updateRoundControls(){
  const area=document.getElementById('roundControlArea');
  if(area) area.innerHTML=roundControlsHtml();
}

function updateTimerDisplay(){
  const totalEl=document.getElementById('totalTime');
  if(totalEl) totalEl.innerText=formatTime(totalRemaining);
  const roundEl=document.getElementById('roundTime');
  if(roundEl) roundEl.innerText=formatTime(roundRemaining);
  const noteEl=document.getElementById('roundNote');
  if(noteEl) noteEl.innerText=getRoundLabel();
  const labels=document.querySelectorAll('.timer-box .label');
  if(roundMode && labels.length>1) labels[1].innerText=`Round ${currentRound} of ${roundCount}`;
  updateRoundControls();
}

function updateProgress(){
  document.getElementById('progressBar').style.width=(session.length?(currentIndex/session.length)*100:0)+'%';
}

function nextCard(){currentIndex++;renderCard()}
function prevCard(){if(currentIndex>0)currentIndex--;renderCard()}
function skipCard(){nextCard()}

function replaceCard(){
  let old=session[currentIndex],
      n=parseInt(document.getElementById('attendees').value,10),
      loc=document.getElementById('location').value,
      energy=document.getElementById('energy').value,
      used=new Set(session.map(a=>String(a.id).replace(/-\d+$/,'')));
  used.delete(String(old.id).replace(/-\d+$/,''));
  let repl=choose(old.section,n,loc,used,energy,['Brain & Movement','Teamwork & Laughter','Light Reaction','Moderate Movement','Lower Intensity / Reset']);
  if(repl){session[currentIndex]=repl;renderCard()}else alert('No suitable replacement found for this slot.');
}

function startTimer(){
  dhgUnlockAudio();
  if(typeof unlockAudio==='function') unlockAudio();
  clearInterval(timerInterval);

  timerInterval=setInterval(()=>{
    if(roundMode){
      if(totalRemaining>0) totalRemaining--;
      if(roundRemaining>0) roundRemaining--;

      if(roundRemaining<=0){
        roundRemaining=0;
        clearInterval(timerInterval);
        timerDoneAlert();
        if(currentRound<roundCount){
          currentRound++;
          roundRemaining=roundTotal;
          setTimeout(updateTimerDisplay,250);
        }
      }
    }else{
      if(totalRemaining>0) totalRemaining--;
      if(totalRemaining<=0){
        totalRemaining=0;
        clearInterval(timerInterval);
        timerDoneAlert();
      }
    }
    updateTimerDisplay();
  },1000);
}

function pauseTimer(){clearInterval(timerInterval)}

function resetTimer(){
  clearInterval(timerInterval);
  totalRemaining=plannedSeconds(session[currentIndex]);
  if(roundMode){
    currentRound=1;
    roundRemaining=roundTotal;
  }
  updateTimerDisplay();
}

function resetRoundTimer(){
  clearInterval(timerInterval);
  roundRemaining=roundTotal;
  updateTimerDisplay();
}

function nextRoundManual(){
  clearInterval(timerInterval);
  if(!roundMode) return;
  if(currentRound < roundCount){
    currentRound++;
    roundRemaining = roundTotal;
  }
  updateTimerDisplay();
}

function skipRound(){
  clearInterval(timerInterval);
  if(!roundMode) return;
  if(currentRound < roundCount){
    currentRound++;
    roundRemaining = roundTotal;
  }else{
    roundRemaining = 0;
  }
  updateTimerDisplay();
}


function formatTime(s){
  s=Math.max(0,Math.round(s||0));
  let m=Math.floor(s/60),sec=s%60;
  return `${m}:${String(sec).padStart(2,'0')}`;
}

function resetToBuilder(){clearInterval(timerInterval);document.getElementById('sessionPanel').classList.add('hidden');document.getElementById('builder').classList.remove('hidden')}function hidePanels(){document.getElementById('libraryPanel').classList.add('hidden');document.getElementById('addPanel').classList.add('hidden');document.getElementById('builder').classList.remove('hidden')}function showLibrary(){document.getElementById('builder').classList.add('hidden');document.getElementById('addPanel').classList.add('hidden');document.getElementById('libraryPanel').classList.remove('hidden');renderLibrary()}function showAdd(){document.getElementById('builder').classList.add('hidden');document.getElementById('libraryPanel').classList.add('hidden');document.getElementById('addPanel').classList.remove('hidden')}
function renderLibrary(){let q=(document.getElementById('search').value||'').toLowerCase(),list=document.getElementById('libraryList');let rows=activities.filter(a=>!q||(a.title+a.section+a.equipment+a.how).toLowerCase().includes(q));rows.sort((a,b)=>a.section.localeCompare(b.section)||a.title.localeCompare(b.title));list.innerHTML=rows.map(a=>`<div class="list-item"><b>${esc(displayTitle(a))}</b><br><span class="badge">${a.section}</span><span class="badge">${a.duration} mins</span><span class="badge">${a.locations.join(', ')}</span><div class="small muted">${esc(a.how)}</div></div>`).join('')}
function addActivity(){let title=document.getElementById('newTitle').value.trim();if(!title)return alert('Please add a title.');let locVal=document.getElementById('newLoc').value;let a={id:title.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+Date.now(),title,section:document.getElementById('newSection').value,duration:parseInt(document.getElementById('newDuration').value,10)||5,rounds:document.getElementById('newRounds').value,
    round_details:(document.getElementById('newRoundDetails') ? document.getElementById('newRoundDetails').value : '').split('\n').map(x=>x.trim()).filter(Boolean),intensity:document.getElementById('newIntensity').value,locations:normaliseLocation(locVal),min:parseInt(document.getElementById('newMin').value,10)||1,max:99,requires_even:document.getElementById('newEven').value==='true',equipment:document.getElementById('newEquipment').value,setup_time:'medium',fun:document.getElementById('newFun').value,setup:document.getElementById('newSetup').value,how:document.getElementById('newHow').value,notes:document.getElementById('newNotes').value};activities.push(a);saveActivities();alert('Activity added.');showLibrary()}
function exportData(){let blob=new Blob([JSON.stringify(activities,null,2)],{type:'application/json'}),url=URL.createObjectURL(blob),a=document.createElement('a');a.href=url;a.download='dhg-activity-library.json';a.click();URL.revokeObjectURL(url)}function importData(event){let file=event.target.files[0];if(!file)return;let reader=new FileReader();reader.onload=e=>{try{activities=JSON.parse(e.target.result);saveActivities();renderLibrary();alert('Imported.')}catch(err){alert('Could not import JSON.')}};reader.readAsText(file)}function resetLibrary(){if(confirm('Reset library to the built-in version? This removes activities you added on this device.')){activities=DEFAULT_ACTIVITIES;saveActivities();renderLibrary()}}
function esc(s){return String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
</script></body></html>
